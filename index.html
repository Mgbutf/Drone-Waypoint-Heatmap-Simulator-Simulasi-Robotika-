<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Waypoint & Heatmap Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="bg-black text-green-400 font-mono overflow-hidden">
    <div class="absolute top-0 left-0 p-6 z-10 pointer-events-none">
        <h1 class="text-2xl font-bold tracking-widest text-cyan-400">UAV_TELEMETRY_SYSTEM</h1>
        <p class="mt-2 text-sm opacity-80">STATUS: <span class="text-green-400">ACTIVE</span></p>
        <p class="text-sm opacity-80">MODE: <span class="text-yellow-400">VOLUMETRIC HEATMAP SCAN</span></p>
        <div id="telemetry" class="mt-4 p-4 border border-cyan-800 bg-black bg-opacity-50">
            ALTITUDE: <span id="alt-val">0.00</span> m<br>
            SPEED: 15 m/s
        </div>
    </div>

    <div id="canvas-container" class="w-full h-screen"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
